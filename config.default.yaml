# Claude Code Usage Monitor - Default Configuration

polling:
  # Interval between polls (seconds)
  interval: 60
  # Cache freshness threshold - skip poll if cache is newer (seconds)
  freshness: 50
  # Model used for polling (cheapest, 1 token per poll)
  model: claude-haiku-4-5-20251001
  # Set false to disable polling entirely
  enabled: true

display:
  # Show estimated API-equivalent cost
  show_cost: true
  # Time periods to show: today, 7d, 30d, all
  periods:
    - today
    - 7d
    - 30d

colors:
  # Utilization percentage thresholds
  green_below: 80
  orange_below: 90

cache:
  # Override cache file path (default: ~/.cache/claude-code-usage/quota.json)
  # path: /custom/path/quota.json

# Override model pricing (per 1M tokens, USD)
# pricing:
#   claude-opus-4:
#     input: 15.00
#     output: 75.00
#     cache_write: 18.75
#     cache_read: 1.50
